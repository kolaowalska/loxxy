version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofmt      
    - goimports  
  settings:
    goimports:
      local-prefixes: github.com/kolaowalska/loxxy


linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - revive
    - misspell
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true

output:
  show-stats: true
  sort-order:
    - file
    - linter
