run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - unused
    - staticcheck
    - revive

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: true
      - name: var-naming
        disabled: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
